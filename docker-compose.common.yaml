services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: twin4dem
      POSTGRES_USER: twin4dem
      POSTGRES_PASSWORD: twin4dem
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twin4dem"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - twin4dem_dev
      - twin4dem

  broker:
    image: rabbitmq:3.13-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: twin4dem
      RABBITMQ_DEFAULT_PASS: twin4dem
    ports:
      - "5672:5672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - twin4dem_dev
      - twin4dem

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - twin4dem_dev
      - twin4dem

volumes:
  db_data:
  redis_data:

networks:
  twin4dem_dev:
  twin4dem:
